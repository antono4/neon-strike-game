<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fruit Slash - Slice & Dice!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #FFA07A 50%, #FF6B6B 100%);
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
            pointer-events: none;
        }

        .score-box, .combo-box, .lives-box {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 20px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .hud-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.8);
            font-weight: 600;
        }

        .hud-value {
            font-family: 'Lilita One', cursive;
            font-size: 32px;
            color: #FFE66D;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            line-height: 1;
        }

        .combo-box .hud-value { color: #FF6B35; }
        .lives-box { display: flex; gap: 8px; align-items: center; }
        .life-heart {
            font-size: 28px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
            transition: all 0.3s;
        }
        .life-heart.lost { filter: grayscale(1); opacity: 0.3; transform: scale(0.8); }

        /* Timer */
        .timer-container {
            position: absolute;
            top: 100px;
            left: 20px;
            right: 20px;
            height: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }
        .timer-container.visible { display: block; }
        .timer-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ECDC4, #FFE66D);
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(135,206,235,0.95) 0%, rgba(255,160,122,0.95) 50%, rgba(255,107,107,0.95) 100%);
            z-index: 100;
            pointer-events: auto;
            opacity: 1;
            transition: opacity 0.4s ease;
            padding: 20px;
        }
        .screen.hidden { opacity: 0; pointer-events: none; }

        .game-title {
            font-family: 'Lilita One', cursive;
            font-size: clamp(48px, 12vw, 72px);
            color: #FF6B35;
            text-shadow: 4px 4px 0 #fff, 6px 6px 0 rgba(0,0,0,0.2);
            margin-bottom: 10px;
            animation: titleBounce 2s ease-in-out infinite;
        }
        @keyframes titleBounce {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .game-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .high-score {
            font-family: 'Lilita One', cursive;
            font-size: 20px;
            color: #FFE66D;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        /* Menu Buttons */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 340px;
            margin-bottom: 20px;
        }

        .menu-btn {
            padding: 20px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .menu-btn .icon { font-size: 32px; }
        .menu-btn .label { font-size: 14px; }

        .btn-classic {
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            color: white;
        }
        .btn-zen {
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            color: white;
        }
        .btn-time {
            background: linear-gradient(135deg, #FFE66D, #F7DC6F);
            color: #333;
        }
        .btn-settings {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            grid-column: span 2;
        }

        .menu-btn:hover, .menu-btn:active {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Settings Panel */
        .settings-panel {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .settings-title {
            font-family: 'Lilita One', cursive;
            font-size: 24px;
            color: #FF6B35;
            text-align: center;
            margin-bottom: 25px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .setting-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle {
            width: 56px;
            height: 30px;
            background: #ddd;
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        .toggle.active { background: #4ECDC4; }
        .toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .toggle.active::after { left: 29px; }

        .back-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            color: white;
            border: none;
            border-radius: 15px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .back-btn:hover { transform: scale(1.02); }

        /* Game Over */
        .final-score-label {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 20px;
        }

        .final-score {
            font-family: 'Lilita One', cursive;
            font-size: clamp(60px, 18vw, 100px);
            color: #FFE66D;
            text-shadow: 4px 4px 0 #FF6B35, 6px 6px 0 rgba(0,0,0,0.2);
            line-height: 1;
        }

        .new-record {
            font-family: 'Lilita One', cursive;
            font-size: 24px;
            color: #FF6B35;
            animation: pulse 0.5s infinite;
            margin: 15px 0;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 340px;
            margin: 20px 0;
        }

        .stat-item {
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-family: 'Lilita One', cursive;
            font-size: 24px;
            color: #FF6B35;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }

        /* Sound Toggle */
        .sound-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.3);
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
            pointer-events: auto;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sound-toggle:hover { transform: scale(1.1); background: rgba(0,0,0,0.5); }

        /* Instructions */
        .instructions {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }

        .instructions span {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            margin: 5px;
        }

        /* Combo Popup */
        .combo-popup {
            position: absolute;
            font-family: 'Lilita One', cursive;
            font-size: 48px;
            color: #FFE66D;
            text-shadow: 3px 3px 0 #FF6B35;
            pointer-events: none;
            animation: comboFloat 1s ease-out forwards;
            z-index: 50;
        }
        @keyframes comboFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
        }

        /* Score Popup */
        .score-popup {
            position: absolute;
            font-family: 'Lilita One', cursive;
            font-size: 28px;
            color: white;
            text-shadow: 2px 2px 0 #FF6B35;
            pointer-events: none;
            animation: scoreFloat 0.8s ease-out forwards;
            z-index: 50;
        }
        @keyframes scoreFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-10px) scale(1.1); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        /* Miss Indicator */
        .miss-indicator {
            position: absolute;
            font-size: 40px;
            animation: missShake 0.5s ease-out forwards;
            z-index: 50;
        }
        @keyframes missShake {
            0% { transform: translateX(0); opacity: 1; }
            25% { transform: translateX(-20px); }
            50% { transform: translateX(20px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); opacity: 0; }
        }

        /* Shake Effect */
        .shake { animation: screenShake 0.3s ease-out; }
        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* Responsive */
        @media (max-width: 350px) {
            .menu-grid { grid-template-columns: 1fr; }
            .btn-settings { grid-column: span 1; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <button class="sound-toggle" id="soundToggle">🔊</button>

    <!-- HUD -->
    <div class="ui-layer" id="hud" style="display: none;">
        <div class="hud">
            <div class="score-box">
                <div class="hud-label">Score</div>
                <div class="hud-value" id="scoreDisplay">0</div>
            </div>
            <div class="combo-box">
                <div class="hud-label">Combo</div>
                <div class="hud-value" id="comboDisplay">x1</div>
            </div>
            <div class="lives-box" id="livesBox">
                <span class="life-heart">❤️</span>
                <span class="life-heart">❤️</span>
                <span class="life-heart">❤️</span>
            </div>
        </div>
        <div class="timer-container" id="timerContainer">
            <div class="timer-bar" id="timerBar"></div>
        </div>
    </div>

    <!-- Main Menu -->
    <div class="screen" id="menuScreen">
        <div class="game-title">FRUIT SLASH</div>
        <div class="game-subtitle">Slice & Dice</div>
        <div class="high-score" id="highScoreDisplay">🏆 Best: 0</div>
        
        <div class="menu-grid">
            <button class="menu-btn btn-classic" onclick="startGame('classic')">
                <span class="icon">🎯</span>
                <span class="label">Classic</span>
            </button>
            <button class="menu-btn btn-zen" onclick="startGame('zen')">
                <span class="icon">🧘</span>
                <span class="label">Zen Mode</span>
            </button>
            <button class="menu-btn btn-time" onclick="startGame('time')">
                <span class="icon">⏱️</span>
                <span class="label">Time Attack</span>
            </button>
            <button class="menu-btn btn-settings" onclick="showSettings()">
                <span class="icon">⚙️</span>
                <span class="label">Settings</span>
            </button>
        </div>

        <div class="instructions">
            <span>👆 Swipe to slice fruits</span>
            <span>💣 Avoid bombs!</span>
        </div>
    </div>

    <!-- Settings -->
    <div class="screen hidden" id="settingsScreen">
        <div class="settings-panel">
            <div class="settings-title">⚙️ Settings</div>
            
            <div class="setting-row">
                <span class="setting-label">🔊 Sound Effects</span>
                <div class="toggle active" id="soundToggleSetting" onclick="toggleSoundSetting()"></div>
            </div>
            
            <div class="setting-row">
                <span class="setting-label">🎵 Music</span>
                <div class="toggle" id="musicToggleSetting" onclick="toggleMusicSetting()"></div>
            </div>
            
            <div class="setting-row">
                <span class="setting-label">📊 Statistics</span>
            </div>
            <div class="stats-grid" style="background: transparent; padding: 0; margin: 0 0 20px 0;">
                <div class="stat-item">
                    <div class="stat-value" id="statGames">0</div>
                    <div class="stat-label">Games</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statBestCombo">0</div>
                    <div class="stat-label">Best Combo</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statSliced">0</div>
                    <div class="stat-label">Fruits Sliced</div>
                </div>
            </div>
            
            <button class="back-btn" onclick="hideSettings()">← Back to Menu</button>
        </div>
    </div>

    <!-- Game Over -->
    <div class="screen hidden" id="gameOverScreen">
        <div class="final-score-label">Final Score</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="new-record hidden" id="newRecord">★ NEW RECORD! ★</div>
        
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="gameoverCombo">0</div>
                <div class="stat-label">Best Combo</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="gameoverSliced">0</div>
                <div class="stat-label">Sliced</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="gameoverAccuracy">0%</div>
                <div class="stat-label">Accuracy</div>
            </div>
        </div>

        <button class="menu-btn btn-classic" style="width: 100%; max-width: 340px;" onclick="startGame(currentMode)">
            <span class="icon">🔄</span>
            <span class="label">Play Again</span>
        </button>
        <button class="menu-btn btn-settings" style="width: 100%; max-width: 340px; margin-top: 15px;" onclick="showMenu()">
            <span class="icon">🏠</span>
            <span class="label">Main Menu</span>
        </button>
    </div>

    <script>
        // ==================== GAME CONFIG ====================
        const CONFIG = {
            GRAVITY: 0.4,
            SPAWN_INTERVAL: 800,
            GAME_DURATION: 60000,
            INITIAL_LIVES: 3,
            COMBO_TIMEOUT: 1000,
            BLADE_TRAIL_LENGTH: 20
        };

        // ==================== FRUIT TYPES WITH REAL IMAGES ====================
        const FRUITS = [
            { name: 'watermelon', emoji: '🍉', radius: 55, points: 10, velocity: { min: 12, max: 17 } },
            { name: 'orange', emoji: '🍊', radius: 45, points: 5, velocity: { min: 14, max: 20 } },
            { name: 'apple', emoji: '🍎', radius: 40, points: 5, velocity: { min: 15, max: 22 } },
            { name: 'apple_red', emoji: '🍏', radius: 40, points: 5, velocity: { min: 15, max: 22 } },
            { name: 'banana', emoji: '🍌', radius: 42, points: 8, velocity: { min: 13, max: 19 } },
            { name: 'grapes', emoji: '🍇', radius: 38, points: 3, velocity: { min: 16, max: 22 } },
            { name: 'strawberry', emoji: '🍓', radius: 35, points: 6, velocity: { min: 14, max: 20 } },
            { name: 'cherries', emoji: '🍒', radius: 36, points: 7, velocity: { min: 14, max: 21 } },
            { name: 'peach', emoji: '🍑', radius: 42, points: 6, velocity: { min: 13, max: 19 } },
            { name: 'pineapple', emoji: '🍍', radius: 50, points: 12, velocity: { min: 11, max: 16 } },
            { name: 'lemon', emoji: '🍋', radius: 38, points: 5, velocity: { min: 14, max: 20 } },
            { name: 'coconut', emoji: '🥥', radius: 45, points: 15, velocity: { min: 10, max: 15 } },
            { name: 'watermelon_slice', emoji: '🍉', radius: 48, points: 10, velocity: { min: 12, max: 18 } },
            { name: 'melon', emoji: '🍈', radius: 50, points: 9, velocity: { min: 11, max: 17 } },
            { name: 'avocado', emoji: '🥑', radius: 40, points: 8, velocity: { min: 13, max: 19 } }
        ];

        // ==================== GAME STATE ====================
        let canvas, ctx;
        let gameMode = 'classic';
        let gameState = 'menu';
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let lives = CONFIG.INITIAL_LIVES;
        let timeLeft = CONFIG.GAME_DURATION;
        let highScore = 0;
        let soundEnabled = true;
        let musicEnabled = false;

        let fruits = [];
        let particles = [];
        let bladeTrail = [];
        let slicedFruits = [];
        let fruitHalves = [];
        let juiceSplashes = [];

        let isSlicing = false;
        let lastSpawn = 0;
        let gameStart = 0;
        let lastSliceTime = 0;

        let stats = { games: 0, bestCombo: 0, totalSliced: 0 };
        let audioCtx = null;

        // ==================== INITIALIZATION ====================
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            loadData();
            updateHighScoreDisplay();
            updateStatsDisplay();
            
            canvas.addEventListener('mousedown', handleStart);
            canvas.addEventListener('mousemove', handleMove);
            canvas.addEventListener('mouseup', handleEnd);
            canvas.addEventListener('mouseleave', handleEnd);
            
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            
            document.getElementById('soundToggle').addEventListener('click', toggleSound);
            
            requestAnimationFrame(gameLoop);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function loadData() {
            try {
                const data = JSON.parse(localStorage.getItem('fruitSlashData')) || {};
                highScore = data.highScore || 0;
                stats = data.stats || stats;
                soundEnabled = data.soundEnabled !== undefined ? data.soundEnabled : true;
                musicEnabled = data.musicEnabled || false;
            } catch(e) {}
            updateSoundUI();
        }

        function saveData() {
            try {
                localStorage.setItem('fruitSlashData', JSON.stringify({
                    highScore, stats, soundEnabled, musicEnabled
                }));
            } catch(e) {}
        }

        // ==================== AUDIO ====================
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                const now = audioCtx.currentTime;
                switch(type) {
                    case 'slice':
                        osc.frequency.setValueAtTime(800, now);
                        osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                        osc.start(); osc.stop(now + 0.15);
                        break;
                    case 'combo':
                        osc.frequency.setValueAtTime(600, now);
                        osc.frequency.setValueAtTime(800, now + 0.08);
                        osc.frequency.setValueAtTime(1000, now + 0.16);
                        gain.gain.setValueAtTime(0.25, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                        osc.start(); osc.stop(now + 0.25);
                        break;
                    case 'bomb':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
                        gain.gain.setValueAtTime(0.4, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                        osc.start(); osc.stop(now + 0.4);
                        break;
                    case 'miss':
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        osc.start(); osc.stop(now + 0.2);
                        break;
                    case 'gameover':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.setValueAtTime(300, now + 0.2);
                        osc.frequency.setValueAtTime(200, now + 0.4);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                        osc.start(); osc.stop(now + 0.6);
                        break;
                }
            } catch(e) {}
        }

        function spawnFruit() {
            const type = FRUITS[Math.floor(Math.random() * FRUITS.length)];
            const padding = type.radius + 20;
            const x = padding + Math.random() * (canvas.width - padding * 2);
            
            const velocity = type.velocity.min + Math.random() * (type.velocity.max - type.velocity.min);
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
            
            // Special items
            let isSpecial = false;
            let specialType = 'normal';
            const rand = Math.random();
            if (rand < 0.05) {
                isSpecial = true;
                specialType = 'bomb';
            } else if (rand < 0.08) {
                isSpecial = true;
                specialType = 'star';
            }
            
            fruits.push({
                x,
                y: canvas.height + type.radius,
                vx: Math.cos(angle) * velocity * 0.3,
                vy: -velocity,
                radius: type.radius,
                emoji: type.emoji,
                name: type.name,
                points: type.points,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.2,
                scale: 1,
                sliced: false,
                isSpecial,
                specialType
            });
        }

        function createJuiceSplash(x, y, color) {
            // Fruit juice particles
            const colors = ['#FF6B35', '#FFA726', '#FFD54F', '#FF5722', '#FFC107'];
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 4 + Math.random() * 12;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 8,
                    radius: 4 + Math.random() * 10,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1,
                    gravity: 0.4
                });
            }
            
            // Juice drops
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x + (Math.random() - 0.5) * 30,
                    y: y + (Math.random() - 0.5) * 30,
                    vx: (Math.random() - 0.5) * 3,
                    vy: Math.random() * 2,
                    radius: 2 + Math.random() * 4,
                    color: '#FFEB3B',
                    life: 0.8,
                    gravity: 0.5
                });
            }
            
            // Slice flash effect
            particles.push({
                x, y,
                vx: 0, vy: 0,
                radius: 50,
                color: 'rgba(255,255,255,0.8)',
                life: 0.3,
                gravity: 0,
                isFlash: true
            });
        }

        function sliceFruit(fruit, sliceAngle) {
            fruit.sliced = true;
            slicedFruits.push(fruit);
            stats.totalSliced++;
            
            // Create juice particles
            createJuiceSplash(fruit.x, fruit.y, '#FF6B35');
            
            // Score
            if (Date.now() - lastSliceTime < CONFIG.COMBO_TIMEOUT) {
                combo++;
            } else {
                combo = 1;
            }
            lastSliceTime = Date.now();
            
            if (combo > maxCombo) maxCombo = combo;
            
            const multiplier = Math.min(1 + (combo - 1) * 0.2, 3);
            const points = Math.floor(fruit.points * multiplier);
            score += points;
            
            showScorePopup(fruit.x, fruit.y, points);
            if (combo >= 3) {
                showComboPopup(fruit.x, fruit.y, combo);
                playSound('combo');
            } else {
                playSound('slice');
            }
            
            updateHUD();
        }

        function handleBomb(fruit) {
            playSound('bomb');
            lives--;
            updateLives();
            
            const indicator = document.createElement('div');
            indicator.className = 'miss-indicator';
            indicator.textContent = '💥';
            indicator.style.left = fruit.x + 'px';
            indicator.style.top = fruit.y + 'px';
            document.body.appendChild(indicator);
            setTimeout(() => indicator.remove(), 500);
            
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 300);
            
            if (lives <= 0) {
                endGame();
            }
        }

        // ==================== INPUT HANDLING ====================
        let lastPoint = null;

        function handleStart(e) {
            if (gameState !== 'playing') return;
            isSlicing = true;
            const rect = canvas.getBoundingClientRect();
            lastPoint = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
            bladeTrail = [{ ...lastPoint, time: Date.now() }];
        }

        function handleMove(e) {
            if (!isSlicing || gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const point = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
            
            checkSlice(lastPoint, point);
            bladeTrail.push({ ...point, time: Date.now() });
            if (bladeTrail.length > CONFIG.BLADE_TRAIL_LENGTH) {
                bladeTrail.shift();
            }
            
            lastPoint = point;
        }

        function handleEnd() {
            isSlicing = false;
            lastPoint = null;
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (gameState !== 'playing') return;
            isSlicing = true;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            lastPoint = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
            bladeTrail = [{ ...lastPoint, time: Date.now() }];
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (!isSlicing || gameState !== 'playing') return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const point = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
            
            checkSlice(lastPoint, point);
            bladeTrail.push({ ...point, time: Date.now() });
            if (bladeTrail.length > CONFIG.BLADE_TRAIL_LENGTH) {
                bladeTrail.shift();
            }
            
            lastPoint = point;
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            isSlicing = false;
            lastPoint = null;
        }

        function checkSlice(from, to) {
            if (!from || !to) return;
            
            const sliceAngle = Math.atan2(to.y - from.y, to.x - from.x);
            
            for (let i = fruits.length - 1; i >= 0; i--) {
                const fruit = fruits[i];
                if (fruit.sliced) continue;
                
                if (lineCircleIntersect(from, to, fruit)) {
                    if (fruit.isSpecial) {
                        if (fruit.specialType === 'bomb') {
                            handleBomb(fruit);
                            fruits.splice(i, 1);
                        } else if (fruit.specialType === 'star') {
                            score += 50;
                            showScorePopup(fruit.x, fruit.y, 50);
                            playSound('combo');
                            fruits.splice(i, 1);
                        }
                    } else {
                        sliceFruit(fruit, sliceAngle);
                        fruits.splice(i, 1);
                    }
                    break;
                }
            }
        }

        function lineCircleIntersect(p1, p2, circle) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const fx = p1.x - circle.x;
            const fy = p1.y - circle.y;
            
            const a = dx * dx + dy * dy;
            const b = 2 * (fx * dx + fy * dy);
            const c = fx * fx + fy * fy - circle.radius * circle.radius;
            
            let discriminant = b * b - 4 * a * c;
            if (discriminant < 0) return false;
            
            discriminant = Math.sqrt(discriminant);
            const t1 = (-b - discriminant) / (2 * a);
            const t2 = (-b + discriminant) / (2 * a);
            
            return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1);
        }

        // ==================== GAME LOOP ====================
        function gameLoop() {
            const now = Date.now();
            
            if (gameState === 'playing') {
                // Spawn fruits
                if (now - lastSpawn > CONFIG.SPAWN_INTERVAL) {
                    spawnFruit();
                    lastSpawn = now;
                }
                
                // Update timer
                if (gameMode === 'time') {
                    timeLeft = Math.max(0, CONFIG.GAME_DURATION - (now - gameStart));
                    document.getElementById('timerBar').style.width = (timeLeft / CONFIG.GAME_DURATION * 100) + '%';
                    if (timeLeft <= 0) {
                        endGame();
                    }
                }
                
                // Combo timeout
                if (combo > 0 && now - lastSliceTime > CONFIG.COMBO_TIMEOUT) {
                    combo = 0;
                    updateHUD();
                }
                
                // Update fruits
                for (let i = fruits.length - 1; i >= 0; i--) {
                    const fruit = fruits[i];
                    fruit.vy += CONFIG.GRAVITY;
                    fruit.x += fruit.vx;
                    fruit.y += fruit.vy;
                    fruit.rotation += fruit.rotationSpeed;
                    
                    // Check if missed (fell below screen)
                    if (fruit.y > canvas.height + fruit.radius * 2) {
                        if (!fruit.isSpecial && !fruit.sliced) {
                            if (gameMode === 'classic') {
                                lives--;
                                updateLives();
                                playSound('miss');
                                if (lives <= 0) {
                                    endGame();
                                }
                            }
                        }
                        fruits.splice(i, 1);
                    }
                }
                
                // Clean old blade trail
                bladeTrail = bladeTrail.filter(p => now - p.time < 100);
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity || 0;
                p.vx *= 0.98;
                if (p.isFlash) {
                    p.life -= 0.1;
                } else {
                    p.life -= 0.015;
                }
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            // Update fruit animation
            for (let i = fruits.length - 1; i >= 0; i--) {
                const fruit = fruits[i];
                fruit.scale = 0.95 + Math.sin(Date.now() * 0.005 + i) * 0.05;
            }
            
            // Render
            render();
            
            requestAnimationFrame(gameLoop);
        }

        // ==================== RENDERING ====================
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw realistic background
            drawRealisticBackground();
            
            // Draw fruits
            fruits.forEach(fruit => {
                if (!fruit.sliced) {
                    drawFruit(fruit);
                }
            });
            
            // Draw particles
            particles.forEach(p => {
                if (p.isFlash) {
                    // Flash effect
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * (1 + (1 - p.life) * 2), 0, Math.PI * 2);
                    const flashGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                    flashGrad.addColorStop(0, `rgba(255, 255, 255, ${p.life})`);
                    flashGrad.addColorStop(1, `rgba(255, 200, 100, 0)`);
                    ctx.fillStyle = flashGrad;
                    ctx.fill();
                } else {
                    // Regular particle
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            });
            
            // Draw realistic blade trail
            if (bladeTrail.length > 1) {
                // Outer glow
                ctx.beginPath();
                ctx.moveTo(bladeTrail[0].x, bladeTrail[0].y);
                for (let i = 1; i < bladeTrail.length; i++) {
                    const p = bladeTrail[i];
                    const prev = bladeTrail[i - 1];
                    const midX = (prev.x + p.x) / 2;
                    const midY = (prev.y + p.y) / 2;
                    ctx.quadraticCurveTo(prev.x, prev.y, midX, midY);
                }
                ctx.lineWidth = 35;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = 'rgba(100, 200, 255, 0.3)';
                ctx.filter = 'blur(8px)';
                ctx.stroke();
                ctx.filter = 'none';
                
                // Middle glow (blue steel)
                ctx.beginPath();
                ctx.moveTo(bladeTrail[0].x, bladeTrail[0].y);
                for (let i = 1; i < bladeTrail.length; i++) {
                    const p = bladeTrail[i];
                    const prev = bladeTrail[i - 1];
                    const midX = (prev.x + p.x) / 2;
                    const midY = (prev.y + p.y) / 2;
                    ctx.quadraticCurveTo(prev.x, prev.y, midX, midY);
                }
                ctx.lineWidth = 15;
                ctx.strokeStyle = 'rgba(150, 200, 255, 0.6)';
                ctx.filter = 'blur(4px)';
                ctx.stroke();
                ctx.filter = 'none';
                
                // Core blade (bright white-blue)
                ctx.beginPath();
                ctx.moveTo(bladeTrail[0].x, bladeTrail[0].y);
                for (let i = 1; i < bladeTrail.length; i++) {
                    const p = bladeTrail[i];
                    const prev = bladeTrail[i - 1];
                    const midX = (prev.x + p.x) / 2;
                    const midY = (prev.y + p.y) / 2;
                    ctx.quadraticCurveTo(prev.x, prev.y, midX, midY);
                }
                ctx.lineWidth = 6;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.stroke();
                
                // Edge highlight
                ctx.beginPath();
                ctx.moveTo(bladeTrail[0].x, bladeTrail[0].y);
                for (let i = 1; i < bladeTrail.length; i++) {
                    const p = bladeTrail[i];
                    const prev = bladeTrail[i - 1];
                    const midX = (prev.x + p.x) / 2;
                    const midY = (prev.y + p.y) / 2;
                    ctx.quadraticCurveTo(prev.x, prev.y, midX, midY);
                }
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(200, 230, 255, 1)';
                ctx.stroke();
                
                // Spark particles along blade
                if (isSlicing && bladeTrail.length > 3) {
                    for (let i = 1; i < bladeTrail.length - 1; i += 2) {
                        const p = bladeTrail[i];
                        const spark = 3 + Math.random() * 4;
                        ctx.beginPath();
                        ctx.arc(p.x + (Math.random() - 0.5) * 10, p.y + (Math.random() - 0.5) * 10, spark, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 200, ${Math.random() * 0.8 + 0.2})`;
                        ctx.fill();
                    }
                }
            }
        }

        function drawRealisticBackground() {
            const time = Date.now();
            const h = canvas.height;
            const w = canvas.width;
            
            // Sky gradient (sunset/golden hour)
            const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
            skyGrad.addColorStop(0, '#1a1a3e'); // Dark blue top
            skyGrad.addColorStop(0.2, '#4a3f6b'); // Purple
            skyGrad.addColorStop(0.4, '#e85d75'); // Pink
            skyGrad.addColorStop(0.5, '#ff8c42'); // Orange
            skyGrad.addColorStop(0.6, '#ffc857'); // Golden yellow
            skyGrad.addColorStop(0.75, '#ffd89b'); // Light gold
            skyGrad.addColorStop(1, '#fff5e6'); // Cream at horizon
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, h);
            
            // Sun
            const sunX = w * 0.7;
            const sunY = h * 0.55;
            const sunRadius = Math.min(w, h) * 0.12;
            
            // Sun glow
            const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunRadius * 3);
            sunGlow.addColorStop(0, 'rgba(255, 200, 100, 0.8)');
            sunGlow.addColorStop(0.3, 'rgba(255, 150, 50, 0.4)');
            sunGlow.addColorStop(0.6, 'rgba(255, 100, 50, 0.1)');
            sunGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = sunGlow;
            ctx.fillRect(0, 0, w, h);
            
            // Sun body
            const sunBody = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunRadius);
            sunBody.addColorStop(0, '#fffef0');
            sunBody.addColorStop(0.7, '#ffdd66');
            sunBody.addColorStop(1, '#ffaa33');
            ctx.beginPath();
            ctx.arc(sunX, sunY, sunRadius, 0, Math.PI * 2);
            ctx.fillStyle = sunBody;
            ctx.fill();
            
            // Clouds (more realistic)
            drawRealisticClouds(time);
            
            // Far mountains (purple/misty)
            drawMountains(h * 0.5, h * 0.7, '#3d2852', '#2a1a3d', 0.4);
            
            // Mid mountains (darker)
            drawMountains(h * 0.6, h * 0.8, '#1a1025', '#0d0812', 0.6);
            
            // Near hills (dark silhouette)
            drawHills(h * 0.75, h, '#0a0510', '#050208', 0.8);
            
            // Ground/grass
            const groundGrad = ctx.createLinearGradient(0, h * 0.85, 0, h);
            groundGrad.addColorStop(0, '#1a0f1a');
            groundGrad.addColorStop(1, '#0a0508');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, h * 0.85, w, h * 0.15);
            
            // Grass tufts
            drawGrass(w, h);
            
            // Birds
            drawBirds(time, w, h);
        }

        function drawRealisticClouds(time) {
            const w = canvas.width;
            const h = canvas.height;
            
            // Cloud configurations
            const clouds = [
                { x: w * 0.1, y: h * 0.15, scale: 1.2, speed: 0.00002 },
                { x: w * 0.4, y: h * 0.08, scale: 0.8, speed: 0.000025 },
                { x: w * 0.7, y: h * 0.18, scale: 1.0, speed: 0.000018 },
                { x: w * 0.25, y: h * 0.25, scale: 0.6, speed: 0.00003 },
                { x: w * 0.85, y: h * 0.12, scale: 0.9, speed: 0.000022 },
            ];
            
            clouds.forEach(cloud => {
                const cx = ((time * cloud.speed) % 1.5) * w - w * 0.2;
                const cy = cloud.y;
                const s = cloud.scale * 50;
                
                // Cloud shadow
                ctx.fillStyle = 'rgba(200, 150, 180, 0.3)';
                drawCloudShape(cx, cy + 10 * cloud.scale, s);
                
                // Cloud body (pinks/oranges from sunset)
                const cloudGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, s * 2);
                cloudGrad.addColorStop(0, 'rgba(255, 220, 200, 0.9)');
                cloudGrad.addColorStop(0.5, 'rgba(255, 180, 150, 0.6)');
                cloudGrad.addColorStop(1, 'rgba(255, 150, 120, 0)');
                ctx.fillStyle = cloudGrad;
                drawCloudShape(cx, cy, s);
            });
        }

        function drawCloudShape(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.2, size * 0.7, 0, Math.PI * 2);
            ctx.arc(x + size * 1.4, y, size * 0.6, 0, Math.PI * 2);
            ctx.arc(x + size * 0.3, y - size * 0.4, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x - size * 0.4, y + size * 0.1, size * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawMountains(baseY, topY, lightColor, darkColor, opacity) {
            const w = canvas.width;
            const h = canvas.height;
            
            ctx.fillStyle = darkColor;
            ctx.globalAlpha = opacity;
            ctx.beginPath();
            ctx.moveTo(0, h);
            
            // Generate mountain peaks
            const peaks = 8;
            for (let i = 0; i <= peaks; i++) {
                const px = (i / peaks) * w;
                const peakHeight = baseY - Math.sin(i * 1.5) * (baseY - topY) * 0.8 - Math.random() * 20;
                if (i === 0 || i === peaks) {
                    ctx.lineTo(px, peakHeight);
                } else {
                    // Random mountain variation
                    const variation = Math.sin(i * 2.3) * 0.3 + Math.cos(i * 1.7) * 0.2;
                    const midY = (peakHeight + baseY) / 2 + variation * (baseY - topY);
                    ctx.quadraticCurveTo(px - w / peaks / 2, midY, px, peakHeight);
                }
            }
            
            ctx.lineTo(w, h);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
            
            // Snow caps
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 1; i < peaks; i++) {
                const px = (i / peaks) * w;
                const peakHeight = baseY - Math.sin(i * 1.5) * (baseY - topY) * 0.8;
                if (peakHeight < topY + (baseY - topY) * 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(px - 15, peakHeight);
                    ctx.lineTo(px, peakHeight - 25);
                    ctx.lineTo(px + 15, peakHeight);
                    ctx.fill();
                }
            }
        }

        function drawHills(baseY, bottomY, lightColor, darkColor, opacity) {
            const w = canvas.width;
            const h = canvas.height;
            
            ctx.fillStyle = darkColor;
            ctx.globalAlpha = opacity;
            ctx.beginPath();
            ctx.moveTo(0, h);
            
            // Rolling hills
            for (let x = 0; x <= w; x += 5) {
                const y = baseY + Math.sin(x * 0.01) * 30 + Math.sin(x * 0.02) * 15 + Math.sin(x * 0.005) * 40;
                ctx.lineTo(x, y);
            }
            
            ctx.lineTo(w, h);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawGrass(w, h) {
            const grassY = h * 0.85;
            
            ctx.strokeStyle = '#1a0f15';
            ctx.lineWidth = 2;
            
            for (let x = 0; x < w; x += 15) {
                const baseHeight = 10 + Math.random() * 15;
                const sway = Math.sin(Date.now() * 0.002 + x * 0.1) * 5;
                
                ctx.beginPath();
                ctx.moveTo(x, h);
                ctx.quadraticCurveTo(x + sway, grassY + baseHeight / 2, x + sway * 1.5, grassY + baseHeight);
                ctx.stroke();
                
                // Multiple grass blades
                if (Math.random() > 0.5) {
                    ctx.beginPath();
                    ctx.moveTo(x + 5, h);
                    ctx.quadraticCurveTo(x + 5 + sway * 0.8, grassY + baseHeight * 0.4, x + 5 + sway, grassY + baseHeight * 0.8);
                    ctx.stroke();
                }
            }
        }

        function drawBirds(time, w, h) {
            const birdCount = 5;
            ctx.strokeStyle = '#2a1a25';
            ctx.lineWidth = 2;
            
            for (let i = 0; i < birdCount; i++) {
                const baseX = (w * 0.2) + (i * w * 0.15);
                const baseY = h * 0.2 + Math.sin(i * 2) * h * 0.05;
                
                // Bird flies in a pattern
                const offsetX = Math.sin(time * 0.001 + i * 1.5) * 30;
                const offsetY = Math.cos(time * 0.0015 + i * 2) * 15;
                const x = baseX + offsetX;
                const y = baseY + offsetY;
                
                // Wing flap animation
                const wingAngle = Math.sin(time * 0.01 + i * 3) * 0.3;
                
                // Bird shape (V shape)
                ctx.beginPath();
                ctx.moveTo(x - 8, y + wingAngle * 5);
                ctx.quadraticCurveTo(x, y - 3, x + 8, y + wingAngle * 5);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(x - 8, y + wingAngle * 5);
                ctx.quadraticCurveTo(x, y + 3, x + 8, y + wingAngle * 5);
                ctx.stroke();
            }
        }

        function drawFruit(fruit) {
            ctx.save();
            ctx.translate(fruit.x, fruit.y);
            ctx.rotate(fruit.rotation);
            ctx.scale(fruit.scale || 1, fruit.scale || 1);
            
            // Shadow
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 6;
            ctx.shadowOffsetY = 6;
            
            // Draw emoji as fruit image
            const fontSize = fruit.radius * 1.8;
            ctx.font = `${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Glow effect
            ctx.shadowColor = 'rgba(255,255,255,0.6)';
            ctx.shadowBlur = 15;
            
            ctx.fillText(fruit.emoji, 0, 0);
            
            ctx.restore();
        }

        // ==================== START ====================
        init();
    </script>
</body>
</html>
